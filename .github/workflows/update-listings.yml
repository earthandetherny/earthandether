name: Update Listings from Etsy

on:
  schedule:
    - cron: '0 8 * * 1'   # Every Monday 8 AM UTC
  workflow_dispatch:       # Manual trigger anytime

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Fetch active Etsy listings
        env:
          ETSY_API_KEY: ${{ secrets.ETSY_API_KEY }}
        run: python fetch_listings.py

      - name: Commit if changed
        run: |
          git config user.name  "Earth + Ether Bot"
          git config user.email "actions@github.com"
          git add listings.json
          git diff --staged --quiet && echo "No changes" || \
            (git commit -m "🛍️ Update listings $(date +'%Y-%m-%d')" && git push)
